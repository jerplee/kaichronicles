<div id="main-menu">

    <!-- Hero banner with a single random book cover -->
    <div class="menu-hero">
        <div class="menu-hero-carousel">
            <img class="menu-hero-img active" src="" alt="Book 1" />
            <img class="menu-hero-img" src="" alt="Book 6" />
            <img class="menu-hero-img" src="" alt="Book 13" />
            <img class="menu-hero-img" src="" alt="Book 21" />
        </div>
        <div class="menu-hero-overlay">
            <h1 data-translation="kaiChronicles">Kai Chronicles</h1>
            <p class="menu-hero-subtitle">Books 1–29</p>
        </div>
    </div>

    <div id="menu-saveSlotsSection">
        <div id="menu-saveSlotsGrid" class="save-slots-grid menu-slots-grid">
        </div>
    </div>

    <div class="menu-actions-row">
        <a href="#downloadBooks" class="large-button">
            <span class="glyphicon glyphicon-cloud-download action-icon"></span>
            <span class="action-label" data-translation="downloadBooks">Download Books</span>
        </a>
    </div>
</div>

<!-- Hidden file inputs for slot upload -->
<input type="file" id="menu-upload-slot1" accept=".json" style="display:none" />
<input type="file" id="menu-upload-slot2" accept=".json" style="display:none" />
<input type="file" id="menu-upload-slot3" accept=".json" style="display:none" />

<!-- New Game Name Modal -->
<div class="modal fade" id="menu-newGameModal" tabindex="-1" role="dialog" aria-labelledby="menu-newGameModalLabel">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
                <h4 class="modal-title" id="menu-newGameModalLabel" data-translation="newGame">New Game</h4>
            </div>
            <div class="modal-body">
                <form id="menu-newGameForm">
                    <div class="form-group">
                        <label for="menu-newGameName" data-translation="enterKaiName">Enter your Kai name:</label>
                        <input type="text" class="form-control" id="menu-newGameName" required maxlength="30" />
                    </div>
                    <div class="form-group">
                        <label for="menu-newGameBook" data-translation="book">Book</label>
                        <select class="form-control" id="menu-newGameBook">
                            <!-- populated by JS -->
                        </select>
                    </div>
                    <input type="hidden" id="menu-newGameSlot" />
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal" data-translation="cancel">Cancel</button>
                <button type="button" class="btn btn-primary" id="menu-startNewGame" data-translation="start">Start</button>
            </div>
        </div>
    </div>
</div>
