<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- The above 3 meta tags *must* come first in the head; any other head content must come *after* these tags -->
    <meta name="description" content="Kai Chronicles, a player for Lone Wolf game books">
    <meta name="author" content="Project Aon">
    <link rel="icon" href="images/favicon.ico">
    <link rel="apple-touch-icon" href="images/icon.png">
    <link rel="manifest" href="manifest.json" />
    <title>Kai Chronicles</title>

    <!-- Bootstrap core CSS -->
    <link href="lib/bootstrap-3.4.1-dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="lib/toastr/toastr.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link href="css/kaichronicles.css" rel="stylesheet">

  </head>

  <body>

    <!-- Navigation bar -->
    <nav id="template-header" class="navbar navbar-inverse navbar-fixed-top">
      <div class="container">

        <div class="navbar-header">

          <button type="button" class="navbar-toggle collapsed"
            id="template-menubutton" title="Toggle sidebar">
            <span class="sr-only">Toggle sidebar</span>
            <span class="icon-bar"></span>
            <span class="icon-bar"></span>
            <span class="icon-bar"></span>
          </button>

          <a class="navbar-brand" href="#mainMenu" id="template-title">
            Kai Chronicles
          </a>

        </div>

      </div>
    </nav>

    <div id="template-offline" class="alert alert-warning text-center" style="display:none; margin-bottom:0; border-radius:0;">
        <span class="glyphicon glyphicon-signal"></span> <span data-translation="offline">You are offline</span>
    </div>

    <!-- Game Sidebar (in-game navigation + character HUD) -->
    <div id="game-sidebar">

      <!-- Character HUD -->
      <div class="sidebar-section sidebar-hud">
        <img src="images/logo-white-bg-40.png" class="sidebar-portrait" alt="Player" id="sidebar-portrait" />
        <div class="sidebar-kai-name" id="sidebar-kaiName">-</div>
        <div class="sidebar-rank" id="sidebar-rank">-</div>

        <div class="sidebar-stat">
          <div class="sidebar-stat-label">
            <span class="glyphicon glyphicon-flash"></span> Combat
          </div>
          <div class="progress">
            <div class="progress-bar" id="sidebar-combat-bar" style="width: 0%"></div>
          </div>
          <span class="sidebar-stat-value" id="sidebar-combat-value">-</span>
        </div>

        <div class="sidebar-stat">
          <div class="sidebar-stat-label">
            <span class="glyphicon glyphicon-heart"></span> Endurance
          </div>
          <div class="progress">
            <div class="progress-bar" id="sidebar-endurance-bar" style="width: 0%"></div>
          </div>
          <span class="sidebar-stat-value" id="sidebar-endurance-value">-</span>
        </div>
      </div>

      <!-- Primary navigation -->
      <nav class="sidebar-nav">
        <a href="#game" class="sidebar-nav-item" id="sidebar-book">
          <span class="glyphicon glyphicon-book"></span> <span data-translation="book">Book</span>
        </a>
        <a href="#actionChart" class="sidebar-nav-item" id="sidebar-actionChart">
          <span class="glyphicon glyphicon-stats"></span> <span data-translation="actionChart">Stats</span>
        </a>
        <a href="#map" class="sidebar-nav-item" id="sidebar-map">
          <span class="glyphicon glyphicon-globe"></span> <span data-translation="map">Map</span>
        </a>
        <a href="#combatTables" class="sidebar-nav-item" id="sidebar-combatTables">
          <span class="glyphicon glyphicon-list-alt"></span> <span data-translation="combatTables">Tables</span>
        </a>
      </nav>

      <!-- Voice mode toggle -->
      <nav class="sidebar-nav sidebar-nav-voice">
        <a href="#" class="sidebar-nav-item" id="sidebar-voiceMode">
          <span class="glyphicon glyphicon-volume-off" id="sidebar-voiceIcon"></span>
          <span id="sidebar-voiceLabel" data-translation="voiceMode">Voice: Off</span>
          <span class="sidebar-voice-help" id="sidebar-voiceHelp" title="Voice commands help">
            <span class="glyphicon glyphicon-question-sign"></span>
          </span>
        </a>
      </nav>

      <!-- Secondary navigation -->
      <nav class="sidebar-nav sidebar-nav-secondary">
        <a href="#mainMenu" class="sidebar-nav-item" id="sidebar-mainMenu">
          <span class="glyphicon glyphicon-home"></span> <span data-translation="mainMenu">Main Menu</span>
        </a>
        <a href="#settings" class="sidebar-nav-item" id="sidebar-settings">
          <span class="glyphicon glyphicon-cog"></span> <span data-translation="settings">Settings</span>
        </a>
      </nav>

    </div><!-- /#game-sidebar -->

    <div class="container" id="template-container">

      <!--Main content-->
      <div id="content">
          <div id="body">
              <img src="images/ajax-loader.gif" alt="Loading image" />
              Loading...
          </div>
      </div>

    </div><!-- /.container -->

    <!-- Unified App Footer -->
    <div class="app-footer" id="app-footer">
      <span id="app-footer-content"></span>
      <span class="footer-theme-toggle" id="footer-themeToggle" title="Toggle dark mode">
        <span class="glyphicon glyphicon-adjust"></span>
      </span>
    </div>

    <!-- Reusable Alert Modal -->
    <div class="modal fade" id="template-alertModal" tabindex="-1" role="dialog" aria-labelledby="template-alertTitle">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                    <h4 class="modal-title" id="template-alertTitle" data-translation="alert">Alert</h4>
                </div>
                <div class="modal-body">
                    <p id="template-alertMessage"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" id="template-alertOk" data-dismiss="modal" data-translation="ok">OK</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Reusable Confirm Modal -->
    <div class="modal fade" id="template-confirmModal" tabindex="-1" role="dialog" aria-labelledby="template-confirmTitle">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                    <h4 class="modal-title" id="template-confirmTitle" data-translation="confirm">Confirm</h4>
                </div>
                <div class="modal-body">
                    <p id="template-confirmMessage"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-default" data-dismiss="modal" data-translation="cancel">Cancel</button>
                    <button type="button" class="btn btn-primary" id="template-confirmOk" data-translation="ok">OK</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Reusable Prompt Modal -->
    <div class="modal fade" id="template-promptModal" tabindex="-1" role="dialog" aria-labelledby="template-promptTitle">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                    <h4 class="modal-title" id="template-promptTitle" data-translation="prompt">Prompt</h4>
                </div>
                <div class="modal-body">
                    <form id="template-promptForm">
                        <div class="form-group">
                            <label for="template-promptInput" id="template-promptLabel"></label>
                            <input type="text" class="form-control" id="template-promptInput" />
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-default" data-dismiss="modal" data-translation="cancel">Cancel</button>
                    <button type="button" class="btn btn-primary" id="template-promptOk" data-translation="ok">OK</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal to see object details -->
    <div class="modal fade" id="template-objectDetails" tabindex="-1" role="dialog" 
        aria-labelledby="template-objectTitle">
      <div class="modal-dialog" role="document">
        <div class="modal-content">

          <div class="modal-header">
            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
            <h4 class="modal-title" id="template-objectTitle">Object</h4>
          </div>

          <div class="modal-body">
            <div class="illustration" id="template-objectImage">
                <img alt="Object image" src="#" />
            </div>
            <p id="template-objectDescription"></p>
            <p id="template-objectDescriptionExtra"></p>
          </div>

          <div class="modal-footer">
            <button type="button" class="btn btn-primary" data-dismiss="modal" 
              data-translation="close">
                Close
            </button>
          </div>
        </div>
        
      </div>
    </div>

    <!-- Manual random table -->
    <div class="modal fade" id="template-randomtable" tabindex="-1" role="dialog" 
        aria-labelledby="template-randomtitle" aria-describedby="template-randomsubtitle" data-backdrop="static">
        <div class="modal-dialog" role="document">
            <div class="modal-content">

                <div class="modal-header">
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                    <h4 class="modal-title" id="template-randomtitle" data-translation="randomTable">
                        Random table
                    </h4>
                    <h5 id="template-randomsubtitle"></h5>
                </div>

                <div class="modal-body">
                    <div class="table-responsive">
                      <table class="table" id="template-containertable">
                          <tbody id="template-randomcontent">
                          </tbody>
                      </table>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" data-dismiss="modal"
                      data-translation="close">
                        Close
                    </button>
                </div>
            </div>
        
        </div>
    </div>

    <!-- Third party -->
    <script src="lib/jquery-3.7.1.min.js"></script>
    <script src="lib/bootstrap-3.4.1-dist/js/bootstrap.min.js"></script>
    <script src="lib/toastr/toastr.min.js"></script>
    <script src="lib/filesaver.js"></script>

    <!-- @ifdef PRODUCTION !>      
      <script>
        var ENVIRONMENT = 'PRODUCTION';
      </script>
    <!-- @endif -->
    <!-- @ifndef PRODUCTION -->
      <script src="lib/xmllint.js"></script>
      <script>
        var ENVIRONMENT = 'DEVELOPMENT';
      </script>
    <!-- @endif -->

    <script src="js/kai.js"></script>
    
    <script>
      kai.App.run(ENVIRONMENT);
    </script>

  </body>
</html>
